[supervisord]
nodaemon=true

[program:fastapi]
command=uvicorn run:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true

[program:streamlit]
command=streamlit run app.py --server.port 7860 --server.address 0.0.0.0 --server.headless true
directory=/app
autostart=true
autorestart=true